<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suribasket | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <div id="siteHeader"></div>

  <main>
    <section class="brand-hero">
      <img src="assets/Suribasket.png" alt="SuriBasket banner">
    </section>

    <section class="page-title login-title">
      <div>
        <p class="eyebrow">Beveiligde toegang</p>
        <h1>Login voor beheer.</h1>
        <p>Log in om toegang te krijgen tot de adminomgeving.</p>
      </div>
    </section>

    <section class="auth-layout">
      <div class="panel auth-panel">
        <div class="section-heading">
          <p class="eyebrow">Authenticatie</p>
          <h2>Inloggen</h2>
        </div>

        <form class="scanner-form" id="loginForm">
          <label for="loginUsername">Gebruikersnaam</label>
          <input type="text" id="loginUsername" autocomplete="username" placeholder="Gebruikersnaam">

          <label for="loginPassword">Wachtwoord</label>
          <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Wachtwoord">

          <button type="submit">Login</button>
        </form>

        <div id="loginMessage" class="result" aria-live="polite"></div>
      </div>

      <aside class="panel helper-panel">
        <p class="eyebrow">Rollen</p>
        <h2>Admin toegang</h2>
        <p>Na het inloggen controleert de backend of de gebruiker de juiste rol heeft voor beveiligde routes.</p>
      </aside>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
