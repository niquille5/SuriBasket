<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suribasket | Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin">
  <div id="siteHeader"></div>

  <main>
    <section class="page-title">
      <div>
        <p class="eyebrow">Adminomgeving</p>
        <h1>Beheercontrole.</h1>
        <p>Deze pagina controleert of je bent ingelogd en de adminrol hebt.</p>
      </div>
      <button type="button" id="logoutButton">Uitloggen</button>
    </section>

    <section class="content-grid">
      <article class="panel">
        <p class="eyebrow">Autorisatie</p>
        <h2>Admin status</h2>
        <div id="adminStatus" class="result show average" aria-live="polite">
          <strong>Admin toegang wordt gecontroleerd...</strong>
        </div>
      </article>

      <article class="panel">
        <p class="eyebrow">Overzicht</p>
        <h2>Database tellingen</h2>
        <div class="feature-list" id="adminOverview">
          <span class="muted">Nog geen data geladen.</span>
        </div>
      </article>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
